<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Club Apolana</title>
  <link rel="icon" type="image/png" href="https://icaxokjsvhlreuwpyxeb.supabase.co/storage/v1/object/public/imagenes-club/logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="nav.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul: #1a5f8f; --azul-oscuro: #123f60; --azul-bg: #e8f2fa;
      --gris: #f5f6f8; --gris-borde: #dde2e8; --texto: #1a1d23; --texto-suave: #6b7280;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gris); color: var(--texto); min-height: 100vh; }

    .login-wrap {
      min-height: calc(100vh - 60px);
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .login-box {
      background: white; border-radius: 16px; padding: 2.5rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 2rem; justify-content: center;
    }
    .login-logo img { width: 44px; height: 44px; border-radius: 50%; }
    .login-logo span { font-size: 1.1rem; font-weight: 700; color: var(--azul); }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; text-align: center; }
    .login-sub { color: var(--texto-suave); font-size: 0.88rem; text-align: center; margin-bottom: 2rem; }

    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--texto-suave); margin-bottom: 0.4rem; margin-top: 1rem; }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gris-borde);
      border-radius: 8px; font-size: 0.92rem; outline: none; transition: border 0.15s;
      font-family: inherit;
    }
    input:focus { border-color: var(--azul); }

    .btn-login {
      width: 100%; margin-top: 1.5rem; padding: 12px;
      background: var(--azul); color: white; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error { color: #dc2626; font-size: 0.82rem; margin-top: 0.75rem; text-align: center; display: none; }
    .back { display: block; text-align: center; margin-top: 1.25rem; font-size: 0.82rem; color: var(--texto-suave); text-decoration: none; }
    .back:hover { color: var(--azul); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <img src="https://icaxokjsvhlreuwpyxeb.supabase.co/storage/v1/object/public/imagenes-club/logo.png" alt="Club Apolana">
      <span>Club Apolana</span>
    </div>
    <h1>Accede a tu perfil</h1>
    <p class="login-sub">Entra con tu email y contraseña del club</p>

    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    <p class="error" id="error">Email o contraseña incorrectos</p>
    <button class="btn-login" id="btn" onclick="doLogin()">Entrar</button>
    <a href="index.html" class="back">← Volver al inicio</a>
  </div>
</div>

<script>
const SB_URL = 'https://icaxokjsvhlreuwpyxeb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljYXhva2pzdmhscmV1d3B5eGViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNzE2NTgsImV4cCI6MjA5NjY0NzY1OH0.xn1ZY-otHY0-l7g64uutSVjiU8DbkHxxZmTvu77IaHA';
const db = supabase.createClient(SB_URL, SB_KEY);

const DESTINOS = {
  admin: 'admin.html', coordinador: 'admin.html',
  entrenador: 'entrenador.html', atleta: 'atleta.html', padre: 'padre.html'
};

// Si ya hay sesión, redirigir directamente
db.auth.getSession().then(({ data }) => {
  if (!data.session) return;
  db.from('perfiles').select('rol').eq('id', data.session.user.id).single()
    .then(({ data: p }) => {
      if (p?.rol) window.location.href = DESTINOS[p.rol] || 'index.html';
    });
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  if (!email || !pass) return;
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  err.style.display = 'none';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error || !data.user) {
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }
  const { data: p } = await db.from('perfiles').select('rol').eq('id', data.user.id).single();
  window.location.href = DESTINOS[p?.rol] || 'index.html';
}

// Enter para hacer login
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
