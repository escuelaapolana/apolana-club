    .btn-p { background: var(--azul); color: white; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-size: 0.88rem; font-weight: 600; transition: opacity 0.15s; }

    .btn-s { background: var(--azul-bg); color: var(--azul); padding: 10px 22px; border-radius: 8px; text-decoration: none; font-size: 0.88rem; font-weight: 600; }
    .links { margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a { color: var(--azul); font-size: 0.82rem; text-decoration: none; }
